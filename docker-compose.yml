version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: proposal_engine_db
    restart: always
    environment:
      POSTGRES_USER: courseat
      POSTGRES_PASSWORD: password_change_me_in_prod
      POSTGRES_DB: proposal_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseat -d proposal_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proposal_engine_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://courseat:password_change_me_in_prod@db:5432/proposal_engine
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: proposal_engine_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  postgres_data:
